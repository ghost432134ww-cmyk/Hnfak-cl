<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - KESİN ÇÖZÜM</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-bottom: 2px solid #333; align-items: center; }
        .brand { color: #007acc; font-weight: bold; font-size: 1.4rem; margin-right: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #0f0; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #555; cursor: not-allowed; }
        main { display: flex; flex: 1; overflow: hidden; }
        #editor, #preview { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 100%; background: #1e1e1e; color: #9cdcfe; border: none; padding: 15px; font-family: 'Consolas', monospace; resize: none; outline: none; border-right: 1px solid #333; }
        iframe { width: 100%; height: 100%; background: white; border: none; }
        .label { background: #333; padding: 5px 15px; font-size: 11px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="brand">HNFAK</div>
    <input type="text" id="prompt-input" placeholder="Kanka isteğini yaz (Örn: Neon havai fişekler)">
    <button id="send-btn" onclick="askGemini()">KODU YAZDIR</button>
</header>

<main>
    <div id="editor">
        <div class="label" id="model-status">KOD EDİTÖRÜ</div>
        <textarea id="code-output" spellcheck="false"></textarea>
    </div>
    <div id="preview">
        <div class="label">CANLI ÖNİZLEME</div>
        <iframe id="preview-frame"></iframe>
    </div>
</main>

<script>
    const codeOutput = document.getElementById('code-output');
    const previewFrame = document.getElementById('preview-frame');
    const sendBtn = document.getElementById('send-btn');
    const modelStatus = document.getElementById('model-status');

    // Senin API Anahtarın
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";

    function updatePreview() {
        const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
        doc.open();
        doc.write(codeOutput.value);
        doc.close();
    }

    async function askGemini() {
        const prompt = document.getElementById('prompt-input').value;
        if (!prompt) return alert("Kanka boş bırakma!");

        sendBtn.disabled = true;
        sendBtn.innerText = "YAZILIYOR...";
        
        // Hata aldığın modelleri en güncel halleriyle deniyoruz
        const models = [
            "gemini-1.5-flash-latest",
            "gemini-1.5-pro-latest",
            "gemini-pro"
        ];

        let success = false;

        for (const modelName of models) {
            if (success) break;
            modelStatus.innerText = `DENENİYOR: ${modelName}...`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sadece HTML/CSS/JS kodlarını içeren tek bir dosya kodu döndür. Açıklama yapma. İstek: ${prompt}` }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    let aiCode = data.candidates[0].content.parts[0].text;
                    // Markdown temizliği
                    aiCode = aiCode.replace(/```html|```javascript|```css|```/g, "").trim();
                    codeOutput.value = aiCode;
                    updatePreview();
                    success = true;
                    modelStatus.innerText = `AKTİF: ${modelName}`;
                }
            } catch (err) {
                console.error(modelName + " denemesi başarısız.");
            }
        }

        if (!success) {
            alert("Kanka bağlantı engellendi veya model bulunamadı. GitHub Pages üzerinden deniyorsan birkaç dakika bekle.");
            modelStatus.innerText = "BAĞLANTI HATASI";
        }

        sendBtn.disabled = false;
        sendBtn.innerText = "KODU YAZDIR";
    }

    // İlk açılış
    codeOutput.value = "";
    updatePreview();
</script>
</body>
</html>
