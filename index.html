<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - GLOBAL EDITION</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1e1e1e; padding: 15px; display: flex; gap: 10px; border-bottom: 2px solid #333; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #0f0; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        main { display: flex; flex: 1; overflow: hidden; }
        #editor, #preview { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 100%; background: #1e1e1e; color: #9cdcfe; border: none; padding: 15px; font-family: monospace; resize: none; outline: none; border-right: 1px solid #333; }
        iframe { width: 100%; height: 100%; background: white; border: none; }
        .label { background: #333; padding: 5px 15px; font-size: 11px; color: #aaa; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div style="color:#007acc; font-weight:bold; font-size:1.4rem;">HNFAK</div>
    <input type="text" id="prompt" placeholder="Kanka isteğini yaz (Örn: Neon Yılan Oyunu)">
    <button id="btn" onclick="generate()">KODU YAZDIR</button>
</header>

<main>
    <div id="editor">
        <div class="label" id="status">KOD EDİTÖRÜ</div>
        <textarea id="output" spellcheck="false"></textarea>
    </div>
    <div id="preview">
        <div class="label">CANLI ÖNİZLEME</div>
        <iframe id="screen"></iframe>
    </div>
</main>

<script>
    const output = document.getElementById('output');
    const screen = document.getElementById('screen');
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');

    // SENİN ANAHTARIN
    const KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";

    function update() {
        const doc = screen.contentDocument || screen.contentWindow.document;
        doc.open(); doc.write(output.value); doc.close();
    }

    async function generate() {
        const p = document.getElementById('prompt').value;
        if(!p) return alert("Boş bırakma kanka!");
        
        btn.disabled = true;
        btn.innerText = "YAZILIYOR...";
        
        // Denenecek modeller
        const models = ["gemini-1.5-flash", "gemini-1.5-pro", "gemini-pro"];
        let success = false;

        for(let m of models) {
            if(success) break;
            status.innerText = `DENENİYOR: ${m}...`;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Sadece HTML/CSS/JS içeren tek dosya kodu döndür. Açıklama yapma. İstek: ${p}` }] }]
                    })
                });

                const data = await res.json();
                if(data.candidates) {
                    let code = data.candidates[0].content.parts[0].text;
                    output.value = code.replace(/```html|```javascript|```css|```/g, "").trim();
                    update();
                    success = true;
                    status.innerText = `AKTİF MODEL: ${m}`;
                }
            } catch(e) { console.error(m + " başarısız."); }
        }

        if(!success) {
            alert("Kanka bağlantı engellendi! Lütfen bu dosyayı bir Web Server (veya GitHub Pages) üzerinden aç.");
            status.innerText = "BAĞLANTI HATASI";
        }
        btn.disabled = false;
        btn.innerText = "KODU YAZDIR";
    }

    output.value = "";
    update();
</script>
</body>
</html>
