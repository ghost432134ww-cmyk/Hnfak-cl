<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - FINAL VADİ</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1a1a1a; padding: 12px 20px; display: flex; gap: 12px; border-bottom: 2px solid #333; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .brand { color: #007acc; font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0,122,204,0.5); }
        input { flex: 1; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #000; color: #00ff41; outline: none; font-family: monospace; transition: 0.3s; }
        input:focus { border-color: #007acc; box-shadow: 0 0 5px #007acc; }
        button { background: #28a745; color: white; border: none; padding: 10px 22px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        button:disabled { background: #444; cursor: not-allowed; }
        main { display: flex; flex: 1; overflow: hidden; background: #121212; }
        #editor, #preview { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 100%; background: #1e1e1e; color: #9cdcfe; border: none; padding: 20px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; resize: none; outline: none; border-right: 1px solid #333; line-height: 1.5; }
        iframe { width: 100%; height: 100%; background: white; border: none; border-radius: 4px; margin: 10px; width: calc(100% - 20px); height: calc(100% - 20px); }
        .label { background: #252526; padding: 6px 15px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; border-bottom: 1px solid #333; }
        #status-info { position: fixed; bottom: 10px; right: 20px; font-size: 12px; color: #007acc; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="brand">HNFAK</div>
    <input type="text" id="ai-prompt" placeholder="Kanka isteğini yaz (Örn: Matrix yağmuru efekti yap)">
    <button id="send-btn" onclick="runHNFAK()">YAZDIR</button>
</header>

<main>
    <div id="editor">
        <div class="label" id="model-name">KOD EDİTÖRÜ</div>
        <textarea id="code-box" spellcheck="false"></textarea>
    </div>
    <div id="preview">
        <div class="label">CANLI ÖNİZLEME</div>
        <iframe id="viewer"></iframe>
    </div>
</main>

<div id="status-info">SİSTEM HAZIR</div>

<script>
    const codeBox = document.getElementById('code-box');
    const viewer = document.getElementById('viewer');
    const btn = document.getElementById('send-btn');
    const modelTag = document.getElementById('model-name');
    const statusInfo = document.getElementById('status-info');

    // API Anahtarın (Görüntüden teyit edildi)
    const API_KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";

    function refreshPreview() {
        const doc = viewer.contentDocument || viewer.contentWindow.document;
        doc.open();
        doc.write(codeBox.value);
        doc.close();
    }

    async function runHNFAK() {
        const prompt = document.getElementById('ai-prompt').value;
        if (!prompt) return alert("Kanka bir şeyler yazman lazım!");

        btn.disabled = true;
        btn.innerText = "YAZIYOR...";
        statusInfo.innerText = "YAPAY ZEKA DÜŞÜNÜYOR...";

        // En stabil modellerden başlıyoruz
        const modelList = [
            "gemini-1.5-flash",
            "gemini-1.5-pro",
            "gemini-pro"
        ];

        let hasSuccess = false;

        for (const model of modelList) {
            if (hasSuccess) break;
            modelTag.innerText = `DENENİYOR: ${model}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: `Sen bir Full-stack web geliştiricisin. SADECE tek bir HTML dosyası (içinde CSS ve JS dahil) döndür. Hiçbir açıklama yapma, sadece kodu ver. İstek: ${prompt}` }]
                        }]
                    })
                });

                const result = await response.json();

                if (result.candidates && result.candidates[0].content) {
                    let aiCode = result.candidates[0].content.parts[0].text;
                    // Markdown bloklarını temizle
                    aiCode = aiCode.replace(/```html|```javascript|```css|```/gi, "").trim();
                    codeBox.value = aiCode;
                    refreshPreview();
                    hasSuccess = true;
                    modelTag.innerText = `AKTİF MODEL: ${model}`;
                    statusInfo.innerText = "KOD ÜRETİLDİ!";
                }
            } catch (err) {
                console.error(model + " hatası:", err);
            }
        }

        if (!hasSuccess) {
            alert("Kanka bağlantı engellendi veya anahtarda sorun var. Konsolu kontrol et!");
            statusInfo.innerText = "BAĞLANTI HATASI!";
        }

        btn.disabled = false;
        btn.innerText = "YAZDIR";
    }

    // Başlangıç ayarı
    codeBox.value = "";
    refreshPreview();
</script>

</body>
</html>
</script>
</body>
</html>
