<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HNFAK Vadi | Core System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --panel: #111111; --accent: #00ff88; --accent-hover: #00cc6a;
            --danger: #ff3333; --text: #ffffff; --muted: #777777; --border: #222222;
            --safe-bottom: env(safe-area-inset-bottom);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* Kilit Ekranı */
        #lockScreen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .lock-box { text-align: center; width: 85%; max-width: 350px; padding: 30px; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; }
        .lock-box i { font-size: 3.5rem; color: var(--accent); margin-bottom: 15px; }
        .lock-box input { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid var(--border); background: #000; color: var(--accent); text-align: center; font-size: 24px; outline: none; margin-bottom: 15px; letter-spacing: 5px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Header */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--panel); z-index: 10; }
        .logo { font-weight: 900; color: var(--text); font-size: 1.2rem; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        .status-dot { width: 10px; height: 10px; background: var(--danger); border-radius: 50%; display: inline-block; margin-right: 5px; transition: 0.3s; }
        .status-dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        /* Panel */
        #serverPanel { background: #0a0a0a; border: 1px solid var(--border); padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .search-box { background: #000; border: 1px solid var(--border); border-radius: 10px; display: none; align-items: center; padding: 12px 15px; margin-bottom: 20px; }
        .search-box input { background: none; border: none; color: white; outline: none; flex: 1; margin-left: 10px; font-size: 16px; }
        .upload-zone { background: #0a0a0a; border: 2px dashed var(--border); color: var(--text); padding: 25px; border-radius: 15px; text-align: center; font-weight: bold; margin-bottom: 25px; cursor: pointer; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }

        /* Grid */
        .file-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .file-card { background: #0a0a0a; border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; position: relative; }
        .file-icon { font-size: 2.5rem; color: var(--accent); margin-bottom: 10px; }
        .file-name { font-size: 0.8rem; font-weight: 500; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Nav */
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + var(--safe-bottom)); z-index: 100; }
        .nav-item { text-align: center; color: var(--muted); flex: 1; font-size: 0.75rem; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        /* Action Sheet */
        #actionSheet { position: fixed; bottom: -100%; left: 0; right: 0; background: var(--panel); border-radius: 20px 20px 0 0; padding: 25px; z-index: 1000; transition: 0.3s; border-top: 1px solid var(--accent); }
        #actionSheet.open { bottom: 0; }
        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(3px); }
        .sheet-btn { padding: 15px; display: flex; align-items: center; gap: 15px; font-size: 1rem; color: white; border-bottom: 1px solid var(--border); }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 30px; font-size: 0.8rem; z-index: 11000; display: none; font-weight: bold; }
        .loader { border: 3px solid var(--border); border-top: 3px solid var(--accent); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-box">
            <i class="fas fa-fingerprint"></i>
            <h2 style="margin-bottom: 5px;">HNFAK <span>VADI</span></h2>
            <p style="color: var(--muted); font-size: 0.8rem; margin-bottom: 20px;">Protokol Girişi</p>
            <input type="password" id="sysPass" inputmode="numeric" placeholder="••••" onkeypress="if(event.key==='Enter') verifyUser()">
            <button class="btn" onclick="verifyUser()">KİLİDİ AÇ</button>
        </div>
    </div>

    <header>
        <div class="logo">HNFAK <span>CORE</span></div>
        <div style="font-size: 0.8rem; display: flex; align-items: center;">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">Yükleniyor...</span>
        </div>
    </header>

    <main>
        <div id="serverPanel">
            <i class="fas fa-wifi" style="font-size: 2rem; color: var(--muted); margin-bottom: 10px; display: block;" id="serverIcon"></i>
            <p style="font-size: 0.9rem; margin-bottom: 15px; color: var(--muted);" id="serverMsg">Dış sunucu aktif değil.</p>
            <button class="btn" id="connectBtn" onclick="connectServer()">
                <i class="fas fa-link"></i> GÜVENLİ TÜNELİ AÇ
            </button>
        </div>

        <div class="search-box" id="searchBox">
            <i class="fas fa-search" style="color: var(--accent);"></i>
            <input type="text" id="searchInput" placeholder="Ara..." onkeyup="filterUI()">
        </div>

        <label class="upload-zone" id="uploadZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <span>Dosya Yükle</span>
            <input type="file" id="fileInput" style="display:none" onchange="uploadData(this)">
        </label>

        <div class="file-grid" id="dataGrid"></div>
    </main>

    <nav>
        <div class="nav-item active" onclick="setCategory('all', this)"><i class="fas fa-database"></i>Hepsi</div>
        <div class="nav-item" onclick="setCategory('image', this)"><i class="fas fa-image"></i>Görsel</div>
        <div class="nav-item" onclick="setCategory('video', this)"><i class="fas fa-film"></i>Video</div>
    </nav>

    <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
    <div id="actionSheet">
        <div class="sheet-btn" onclick="viewFile()"><i class="fas fa-external-link-alt"></i> Aç</div>
        <div class="sheet-btn" onclick="downloadFile()"><i class="fas fa-download"></i> İndir</div>
        <div class="sheet-btn" onclick="deleteFile()" style="color: var(--danger);"><i class="fas fa-trash"></i> Sil</div>
    </div>

    <div id="toast"></div>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script>
        // KANKA: KENDİ API KEY'İNİ BURAYA YAZ
        const CLIENT_ID = '729053073961-m6mfikg3vfek9bipfve3vdlunkuvbon0.apps.googleusercontent.com';
        const API_KEY = 'AIzaSyA7Gx3a--rVjYEELm6O3fabGGJNfjYtUdc';
        
        const SCOPES = 'https://www.googleapis.com/auth/drive.file';
        const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/discovery/v3/rest';

        let tokenClient, isApiReady = false, serverData = [], selectedFile = null, activeCat = 'all';

        function verifyUser() {
            if(document.getElementById('sysPass').value === '1453') {
                document.getElementById('lockScreen').style.opacity = '0';
                setTimeout(() => document.getElementById('lockScreen').style.display = 'none', 500);
            } else { showToast("Erişim Engellendi!"); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function gapiLoaded() {
            gapi.load('client', async () => {
                try {
                    await gapi.client.init({ apiKey: API_KEY, discoveryDocs: [DISCOVERY_DOC] });
                    isApiReady = true;
                    document.getElementById('statusText').innerText = "Hazır";
                } catch(e) { 
                    alert("API Başlatma Hatası: " + e.message); 
                }
            });
        }

        function gisLoaded() {
            try {
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID, scope: SCOPES, callback: ''
                });
            } catch(e) {
                alert("GIS Hatası: " + e.message);
            }
        }

        function connectServer() {
            if(!isApiReady || !tokenClient) {
                alert("Sistem kütüphaneleri henüz yüklenmedi. Lütfen 3 saniye bekleyip tekrar deneyin.");
                return;
            }
            
            tokenClient.callback = async (resp) => {
                if (resp.error) {
                    alert("Google Bağlantı Hatası: " + resp.error + "\nDetay: " + resp.error_description);
                    return;
                }
                document.getElementById('statusDot').classList.add('online');
                document.getElementById('statusText').innerText = "Çevrimiçi";
                document.getElementById('serverIcon').style.color = "var(--accent)";
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('searchBox').style.display = 'flex';
                document.getElementById('uploadZone').style.display = 'flex';
                fetchData();
            };
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        async function fetchData() {
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;"><div class="loader"></div></div>';
            try {
                let res = await gapi.client.drive.files.list({
                    'pageSize': 50, 'fields': 'files(id, name, mimeType, webViewLink, webContentLink)', 'orderBy': 'createdTime desc'
                });
                serverData = res.result.files || [];
                filterUI();
            } catch (e) { showToast("Veri çekilemedi!"); }
        }

        function filterUI() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';
            let filtered = serverData;
            if(activeCat !== 'all') filtered = filtered.filter(f => f.mimeType.includes(activeCat));
            if(q) filtered = filtered.filter(f => f.name.toLowerCase().includes(q));

            if(filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted)">Dosya yok.</div>';
                return;
            }

            filtered.forEach(f => {
                let icon = f.mimeType.includes('image') ? 'fa-file-image' : (f.mimeType.includes('video') ? 'fa-file-video' : 'fa-file-alt');
                grid.innerHTML += `<div class="file-card" onclick="openMenu('${f.id}')"><i class="fas ${icon} file-icon"></i><div class="file-name">${f.name}</div></div>`;
            });
        }

        function uploadData(input) {
            const file = input.files[0]; if (!file) return;
            showToast("Veri Aktarılıyor...");
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify({name: file.name, mimeType: file.type})], {type: 'application/json'}));
            form.append('file', file);

            fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + gapi.client.getToken().access_token }, body: form
            }).then(() => { showToast("Yüklendi!"); fetchData(); input.value = ''; });
        }

        function openMenu(id) {
            selectedFile = serverData.find(x => x.id === id);
            document.getElementById('sheetOverlay').style.display = 'block';
            document.getElementById('actionSheet').classList.add('open');
        }

        function closeSheet() {
            document.getElementById('sheetOverlay').style.display = 'none';
            document.getElementById('actionSheet').classList.remove('open');
        }

        function viewFile() { window.open(selectedFile.webViewLink, '_blank'); closeSheet(); }
        function downloadFile() { window.open(selectedFile.webContentLink, '_blank'); closeSheet(); }
        async function deleteFile() {
            if(!confirm("Bu veriyi kalıcı olarak silmek istediğine emin misin?")) return;
            await gapi.client.drive.files.delete({fileId: selectedFile.id});
            showToast("İmha edildi"); fetchData(); closeSheet();
        }

        function setCategory(cat, el) {
            activeCat = cat;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active'); filterUI();
        }
    </script>
</body>
</html>
