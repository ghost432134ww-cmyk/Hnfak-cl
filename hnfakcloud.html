<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HNFAK AI - KESİN ÇÖZÜM</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { background: #1e1e1e; padding: 10px 20px; display: flex; gap: 10px; border-bottom: 2px solid #333; align-items: center; }
        .brand { color: #007acc; font-weight: bold; font-size: 1.4rem; margin-right: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #000; color: #0f0; outline: none; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #555; }
        main { display: flex; flex: 1; overflow: hidden; }
        #editor, #preview { flex: 1; display: flex; flex-direction: column; }
        textarea { width: 100%; height: 100%; background: #1e1e1e; color: #9cdcfe; border: none; padding: 15px; font-family: 'Consolas', monospace; resize: none; outline: none; border-right: 1px solid #333; }
        iframe { width: 100%; height: 100%; background: white; border: none; }
        .label { background: #333; padding: 5px 15px; font-size: 12px; color: #bbb; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <div class="brand">HNFAK AI</div>
    <input type="text" id="prompt" placeholder="Kanka buraya ne yapacağımı yaz...">
    <button id="send-btn" onclick="generateCode()">KODU OLUŞTUR</button>
</header>

<main>
    <div id="editor">
        <div class="label">KODLAR</div>
        <textarea id="output" spellcheck="false"></textarea>
    </div>
    <div id="preview">
        <div class="label">ÖNİZLEME</div>
        <iframe id="screen"></iframe>
    </div>
</main>

<script>
    const output = document.getElementById('output');
    const screen = document.getElementById('screen');
    const btn = document.getElementById('send-btn');
    const input = document.getElementById('prompt');

    // Senin çalışan API Anahtarın
    const KEY = "AIzaSyBgw8n9OtmEWdbsJCDLSaemk-Zqlnh0fRg";

    function update() {
        const doc = screen.contentDocument || screen.contentWindow.document;
        doc.open();
        doc.write(output.value);
        doc.close();
    }

    output.addEventListener('input', update);

    async function generateCode() {
        if (!input.value) return alert("Kanka boş bırakma!");
        
        btn.disabled = true;
        btn.innerText = "YAZILIYOR...";
        output.value = "AI Kodları hazırlıyor, lütfen bekle kanka...";

        try {
            // En güncel ve stabil model endpoint'i
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Sen profesyonel bir yazılımcısın. Sadece HTML, CSS ve JS kodlarını içeren tek bir dosya döndür. Markdown (açıklama) yapma. İsteğim: ${input.value}` }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error.message);
            }

            let code = data.candidates[0].content.parts[0].text;
            
            // Markdown temizleme (Baştaki ve sondaki ``` işaretlerini atar)
            code = code.replace(/```html/g, "").replace(/```javascript/g, "").replace(/```css/g, "").replace(/```/g, "").trim();

            output.value = code;
            update();

        } catch (err) {
            alert("HATA: " + err.message);
            output.value = "Bir hata oluştu: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "KODU OLUŞTUR";
        }
    }

    // Başlangıç ekranı
    output.value = "<!DOCTYPE html>\n<html>\n<body style='background:#121212; color:#007acc; text-align:center; padding-top:100px; font-family:sans-serif;'>\n<h1>HNFAK Vadi AI Aktif!</h1>\n<p>Yukarıdaki kutuya isteğini yaz ve butona bas Kadir.</p>\n</body>\n</html>";
    update();
</script>

</body>
</html>
